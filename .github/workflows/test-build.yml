name: Test Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install dependencies (ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: check formatting
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: clippy
        working-directory: ./src-tauri
        run: cargo clippy -- -D warnings

      - name: run tests
        working-directory: ./src-tauri
        run: cargo test --lib

  build:
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: get version
        id: get-version
        shell: bash
        run: echo "version=$(node -pe "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 file

      - name: install frontend dependencies
        run: npm ci
        working-directory: .

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "."
          includeUpdaterJson: false

      - name: Package Windows Installer
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          mkdir -p installer-staging
          cp src-tauri/target/release/bundle/nsis/*-setup.exe "installer-staging/NWN2EE-Save-Editor-${VERSION}-Setup.exe"
          7z a "NWN2EE-Save-Editor-${VERSION}-Windows-Installer.zip" ./installer-staging/*

      - name: Package Windows Portable
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          mkdir -p portable-staging
          cp "src-tauri/target/release/app.exe" "portable-staging/NWN2EE Save Editor.exe"
          7z a "NWN2EE-Save-Editor-${VERSION}-Windows-Portable.zip" ./portable-staging/*

      - name: Package Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          mkdir -p appimage-staging
          cp src-tauri/target/release/bundle/appimage/*.AppImage appimage-staging/ 2>/dev/null || true
          cd appimage-staging && zip "../NWN2EE-Save-Editor-${VERSION}-Linux-AppImage.zip" ./* 2>/dev/null || true

      - name: Package Linux Deb
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          mkdir -p deb-staging
          cp src-tauri/target/release/bundle/deb/*.deb deb-staging/ 2>/dev/null || true
          cd deb-staging && zip "../NWN2EE-Save-Editor-${VERSION}-Linux-Deb.zip" ./* 2>/dev/null || true

      - name: Upload Windows Installer
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Windows-Installer
          path: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Windows-Installer.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Windows Portable
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Windows-Portable
          path: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Windows-Portable.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Linux-AppImage
          path: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Linux-AppImage.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Linux Deb
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Linux-Deb
          path: NWN2EE-Save-Editor-${{ steps.get-version.outputs.version }}-Linux-Deb.zip
          retention-days: 7
          if-no-files-found: ignore
