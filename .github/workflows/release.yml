name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      upload_url: ${{ steps.create-release.outputs.upload_url }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: get version
        id: get-version
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: create release
        id: create-release
        uses: actions/github-script@v6
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.PACKAGE_VERSION}`,
              name: `Desktop App v${process.env.PACKAGE_VERSION}`,
              body: 'Take a look at the assets to download and install this app.',
              draft: true,
              prerelease: false
            })
            core.setOutput('upload_url', data.upload_url);
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 file

      - name: install frontend dependencies
        run: npm ci
        working-directory: .

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: "."

      - name: Package Windows Installer
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p installer-staging
          cp src-tauri/target/release/bundle/nsis/*-setup.exe "installer-staging/NWN2EE-Save-Editor-${VERSION}-Setup.exe"
          7z a "NWN2EE-Save-Editor-${VERSION}-Windows-Installer.zip" ./installer-staging/*

      - name: Upload Windows Installer Asset
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Windows-Installer.zip
          asset_name: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Windows-Installer.zip
          asset_content_type: application/zip

      - name: Package Windows Portable
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p portable-staging
          cp "src-tauri/target/release/app.exe" "portable-staging/NWN2EE Save Editor.exe"
          7z a "NWN2EE-Save-Editor-${VERSION}-Windows-Portable.zip" ./portable-staging/*

      - name: Upload Windows Portable Asset
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Windows-Portable.zip
          asset_name: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Windows-Portable.zip
          asset_content_type: application/zip

      - name: Package Linux AppImage
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p appimage-staging
          cp src-tauri/target/release/bundle/appimage/*.AppImage appimage-staging/
          cd appimage-staging && zip "../NWN2EE-Save-Editor-${VERSION}-Linux-AppImage.zip" ./*

      - name: Upload Linux AppImage Asset
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Linux-AppImage.zip
          asset_name: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Linux-AppImage.zip
          asset_content_type: application/zip

      - name: Package Linux Deb
        if: matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p deb-staging
          cp src-tauri/target/release/bundle/deb/*.deb deb-staging/
          cd deb-staging && zip "../NWN2EE-Save-Editor-${VERSION}-Linux-Deb.zip" ./*

      - name: Upload Linux Deb Asset
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Linux-Deb.zip
          asset_name: NWN2EE-Save-Editor-${{ needs.create-release.outputs.version }}-Linux-Deb.zip
          asset_content_type: application/zip
